<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>"
    />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Curalink — AI Clinical Research Assistant</title>

    <!-- SEO -->
    <meta
      name="description"
      content="Curalink is an AI-powered clinical research assistant integrating PubMed, OpenAlex, and ClinicalTrials data."
    />
    <meta name="theme-color" content="#0a0f1e" />

    <!-- Open Graph (for sharing links) -->
    <meta property="og:title" content="Curalink" />
    <meta
      property="og:description"
      content="AI-powered clinical research assistant for real-time medical insights."
    />
    <meta property="og:type" content="website" />

    <!-- Performance: preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Prevent flash of unstyled content -->
    <style>
      html, body {
        background-color: #0a0f1e;
        color: #e5e7eb;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <!-- Root App -->
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
